name: Epic Driver

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

jobs:
  find-work:
    name: Find unblocked issues
    if: |
      (startsWith(github.event.comment.body, '/ship run') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.base.ref, 'shipyard/epic-'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    outputs:
      has_work: ${{ steps.find-work.outputs.has_work }}
      work_json: ${{ steps.find-work.outputs.work_json }}

    steps:
      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@SHIPYARD_VERSION"

      - name: Close completed issues
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          printf '%s' "$PR_BODY" | grep -oiE '(closes|fixes|resolves) #[0-9]+' \
            | grep -oE '[0-9]+' \
            | while read -r issue_num; do
                gh issue close "$issue_num" --repo "$GITHUB_REPOSITORY" || true
              done

      - name: Find epic and unblocked issues
        id: find-work
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: shipyard find-work

  execute:
    name: Execute tasks with Agent SDK
    needs: find-work
    if: needs.find-work.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@SHIPYARD_VERSION"

      - name: Write work JSON to file
        env:
          WORK_JSON: ${{ needs.find-work.outputs.work_json }}
        run: python3 -c "import os; open('work.json','w').write(os.environ['WORK_JSON'])"

      - name: Create implementation branch
        run: |
          EPIC=$(python3 -c "import json; print(json.load(open('work.json'))['epic_id'])")
          EPIC_BRANCH="shipyard/epic-${EPIC}"
          BRANCH="${EPIC_BRANCH}-run-${{ github.run_id }}"
          git fetch origin "$EPIC_BRANCH"
          git checkout "$EPIC_BRANCH"
          git checkout -b "$BRANCH"
          echo "SHIPYARD_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "SHIPYARD_EPIC_BRANCH=$EPIC_BRANCH" >> "$GITHUB_ENV"

      - name: Run agent pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: shipyard execute -i work.json

      - name: Push branch and open pull request
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: shipyard publish-execution --branch "$SHIPYARD_BRANCH" --base-branch "$SHIPYARD_EPIC_BRANCH" -i work.json

  update-docs:
    name: Update documentation
    needs: find-work
    if: |
      needs.find-work.outputs.has_work == 'false' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@SHIPYARD_VERSION"

      - name: Check out epic branch and compute base SHA
        run: |
          EPIC_BRANCH="${{ github.event.pull_request.base.ref }}"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$EPIC_BRANCH" "$DEFAULT_BRANCH"
          git checkout "$EPIC_BRANCH"
          BASE_SHA=$(git merge-base "origin/$DEFAULT_BRANCH" HEAD)
          echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          echo "EPIC_BRANCH=$EPIC_BRANCH" >> "$GITHUB_ENV"
          echo "DEFAULT_BRANCH=$DEFAULT_BRANCH" >> "$GITHUB_ENV"

      - name: Run documentation agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: shipyard update-docs --base-sha "$BASE_SHA"

      - name: Commit and push documentation changes
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "docs: update documentation for epic $EPIC_BRANCH"
          git push origin "$EPIC_BRANCH"

      - name: Open epic pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EPIC_NUMBER=$(echo "$EPIC_BRANCH" | sed 's|shipyard/epic-||')
          EPIC_TITLE=$(gh issue view "$EPIC_NUMBER" --repo "${{ github.repository }}" --json title --jq '.title')
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "$EPIC_BRANCH" \
            --base "$DEFAULT_BRANCH" \
            --title "feat: epic #${EPIC_NUMBER}: ${EPIC_TITLE}" \
            --body "All tasks for epic #${EPIC_NUMBER} are complete. Closes #${EPIC_NUMBER}." \
          || echo "PR already exists for $EPIC_BRANCH"
