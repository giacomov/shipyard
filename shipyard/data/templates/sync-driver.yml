name: Sync Driver

on:
  pull_request:
    types: [closed]

jobs:
  sync:
    name: Sync plan to GitHub Issues
    if: |
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'plan')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - uses: astral-sh/setup-uv@v4

      - name: Ensure gh CLI is available
        run: |
          command -v gh && exit 0
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
            | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] \
            https://cli.github.com/packages stable main" \
            | tee /etc/apt/sources.list.d/github-cli.list
          apt-get update -qq && apt-get install -y gh

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@SHIPYARD_VERSION"

      - name: Extract issue number from branch
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          ISSUE=$(echo "$BRANCH" | sed 's|plan/i||')
          echo "issue_number=${ISSUE}" >> "$GITHUB_OUTPUT"

      - name: Link agent skills for Claude Code
        run: |
          mkdir -p .claude
          ln -s "$(pwd)/.agents/skills" .claude/skills

      - name: Generate tasks.json from plan
        env:
          GH_TOKEN: ${{ github.token }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          ISSUE="${{ steps.extract.outputs.issue_number }}"
          ISSUE_TITLE=$(gh issue view "$ISSUE" --repo "${{ github.repository }}" --json title --jq '.title')
          shipyard tasks -i "plans/i${ISSUE}.md" -o tasks.json --title "Implementation: ${ISSUE_TITLE}"

      - name: Sync tasks to GitHub Issues
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          shipyard sync -i tasks.json --no-in-progress-label \
            --repo "${{ github.repository }}"
