name: Plan Driver

on:
  issue_comment:
    types: [created]

concurrency:
  group: plan-driver-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    name: Generate or update implementation plan
    if: |
      (startsWith(github.event.comment.body, '/ship plan') ||
       startsWith(github.event.comment.body, '/ship replan')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@main"

      - name: Extract GitHub event context
        id: extract-event
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: shipyard extract-github-event

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Checkout branch
        run: |
          ISSUE="${{ steps.extract-event.outputs.issue_number }}"
          git fetch origin
          if [ "${{ steps.extract-event.outputs.has_review }}" == "true" ]; then
            git checkout "shipyard-plan/i${ISSUE}"
          elif git ls-remote --exit-code origin "shipyard-plan/i${ISSUE}" > /dev/null 2>&1; then
            git checkout -b "shipyard-plan/i${ISSUE}" "origin/shipyard-plan/i${ISSUE}"
          else
            git checkout -b "shipyard-plan/i${ISSUE}"
          fi

      - name: Generate or update plan
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ steps.extract-event.outputs.has_review }}" == "true" ]; then
            EXTRA_ARGS="--pr-number ${{ steps.extract-event.outputs.pr_number }} \
              --review-feedback-file review-feedback.txt \
              --existing-plan-path plans/i${{ steps.extract-event.outputs.issue_number }}.md"
          fi
          shipyard plan \
            --prompt-file prompt.txt \
            --issue-number ${{ steps.extract-event.outputs.issue_number }} \
            --issue-title "${{ steps.extract-event.outputs.issue_title }}" \
            $EXTRA_ARGS

      - name: Commit and publish plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE="${{ steps.extract-event.outputs.issue_number }}"
          TITLE="${{ steps.extract-event.outputs.issue_title }}"
          HAS_REVIEW="${{ steps.extract-event.outputs.has_review }}"
          BRANCH="shipyard-plan/i${ISSUE}"

          git add "plans/i${ISSUE}.md"
          if [ "$HAS_REVIEW" == "true" ]; then
            git commit -m "docs: update implementation plan for issue #${ISSUE} (re-plan)"
            git push origin "$BRANCH"
          else
            git commit -m "docs: add implementation plan for issue #${ISSUE}"
            git push -u origin "$BRANCH"
            if ! gh pr view "$BRANCH" --repo "${{ github.repository }}" --json state --jq 'select(.state=="OPEN")' 2>/dev/null | grep -q OPEN; then
              PR_URL=$(gh pr create \
                --base main --head "$BRANCH" \
                --title "Plan: ${TITLE}" \
                --body "Closes #${ISSUE}" \
                --repo "${{ github.repository }}")
              gh issue comment "${ISSUE}" \
                --repo "${{ github.repository }}" \
                --body "Shipyard has created a plan for this issue: ${PR_URL}"
            fi
          fi
