name: Epic Driver

on:
  issues:
    types: [labeled]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Epic issue number to drive"
        required: true
        type: string

jobs:
  find-work:
    name: Find unblocked issues
    if: |
      (github.event_name == 'issues' &&
       github.event.label.name == 'in-progress' &&
       github.event.issue.pull_request == '') ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      has_work: ${{ steps.find-work.outputs.has_work }}
      work_json: ${{ steps.find-work.outputs.work_json }}

    steps:
      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@main"

      - name: Find epic and unblocked issues
        id: find-work
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
        run: shipyard find-work

  execute:
    name: Execute tasks with Agent SDK
    needs: find-work
    if: needs.find-work.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@main"

      - name: Write work JSON to file
        env:
          WORK_JSON: ${{ needs.find-work.outputs.work_json }}
        run: python3 -c "import os; open('work.json','w').write(os.environ['WORK_JSON'])"

      - name: Create implementation branch
        run: |
          EPIC=$(python3 -c "import json; print(json.load(open('work.json'))['epic_id'])")
          EPIC_BRANCH="shipyard/epic-${EPIC}"
          BRANCH="${EPIC_BRANCH}-run-${{ github.run_id }}"
          git fetch origin "$EPIC_BRANCH"
          git checkout "$EPIC_BRANCH"
          git checkout -b "$BRANCH"
          echo "SHIPYARD_BRANCH=$BRANCH" >> "$GITHUB_ENV"
          echo "SHIPYARD_EPIC_BRANCH=$EPIC_BRANCH" >> "$GITHUB_ENV"

      - name: Run agent pipeline
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: shipyard execute -i work.json

      - name: Push branch and open pull request
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: shipyard publish-execution --branch "$SHIPYARD_BRANCH" --base-branch "$SHIPYARD_EPIC_BRANCH" -i work.json

  update-docs:
    name: Update documentation
    needs: find-work
    if: |
      needs.find-work.outputs.has_work == 'false' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - uses: astral-sh/setup-uv@v4

      - name: Install shipyard
        run: uv tool install "git+https://github.com/giacomov/shipyard@main"

      - name: Check out epic branch and compute base SHA
        run: |
          EPIC_BRANCH="${{ github.event.pull_request.head.ref }}"
          git fetch origin "$EPIC_BRANCH"
          git checkout "$EPIC_BRANCH"
          BASE_SHA=$(git merge-base "origin/${{ github.event.pull_request.base.ref }}" HEAD)
          echo "BASE_SHA=$BASE_SHA" >> "$GITHUB_ENV"
          echo "EPIC_BRANCH=$EPIC_BRANCH" >> "$GITHUB_ENV"

      - name: Run documentation agent
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: shipyard update-docs --base-sha "$BASE_SHA"

      - name: Push documentation changes
        env:
          GH_TOKEN: ${{ github.token }}
        run: git push origin "$EPIC_BRANCH"
